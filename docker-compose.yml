services:
  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      MONGODB_URI: mongodb://mongodb:27017/musicstreamsync
      # No compose-level default: the server itself fails fast with a clear
      # message when the secret is blank (ServerConfig.fromEnvironment).
      SYNC_SHARED_SECRET: ${SYNC_SHARED_SECRET:-}
      SYNC_INTERVAL_MINUTES: ${SYNC_INTERVAL_MINUTES:-5}
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  mongodb:
    image: mongo:8
    volumes:
      - mongodb-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  mongodb-data:
