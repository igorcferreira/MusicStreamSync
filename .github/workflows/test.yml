name: Test

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

on: [ pull_request ]

env:
  PrivateKey: '<BASE64_STRING_OF_PEM_FILE>'
  TeamId: '<APPLE_STORE_TEAM_ID>'
  KeyId: '<MUSIC_SERVICE_KEY_ID>'
  LastFMAPIKey: '<LAST_FM_KEY>'
  LastFMAPISecret: '<LAST_FM_KEY>'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  swiftlint:
    runs-on: macos-26
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Install SwiftLint
        run: brew install swiftlint
      - name: Lint Swift
        run: swiftlint lint --config .swiftlint.yml --reporter github-actions-logging

  ktlint:
    runs-on: macos-26
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Cache Ruby gems
        uses: actions/cache@v5
        with:
          path: vendor/bundle
          key: ${{ runner.os }}-gems-${{ hashFiles('Gemfile.lock') }}
          restore-keys: ${{ runner.os }}-gems-
      - name: Generate Arkana module
        run: |
          bundle config set --local path 'vendor/bundle'
          bundle install
          bundle exec arkana -l kotlin
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: gradle
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
      - name: Lint Kotlin
        run: ./gradlew ktlintCheck

  android-lint:
    runs-on: macos-26
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Cache Ruby gems
        uses: actions/cache@v5
        with:
          path: vendor/bundle
          key: ${{ runner.os }}-gems-${{ hashFiles('Gemfile.lock') }}
          restore-keys: ${{ runner.os }}-gems-
      - name: Generate Arkana module
        run: |
          bundle config set --local path 'vendor/bundle'
          bundle install
          bundle exec arkana -l kotlin
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: gradle
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
      - name: Lint Android
        run: ./gradlew lint

  tests:
    runs-on: macos-26
    permissions:
      checks: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Cache Ruby gems
        uses: actions/cache@v5
        with:
          path: vendor/bundle
          key: ${{ runner.os }}-gems-${{ hashFiles('Gemfile.lock') }}
          restore-keys: ${{ runner.os }}-gems-
      - name: Generate Arkana module
        run: |
          bundle config set --local path 'vendor/bundle'
          bundle install
          bundle exec arkana -l kotlin
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: gradle
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
      - name: Run tests
        run: ./gradlew testAndroid iosSimulatorArm64Test
      - name: Publish Test Report
        uses: actions/upload-artifact@v6
        with:
          name: test-results
          path: ./shared/build/test-results
      - name: Annotate Test Report
        uses: mikepenz/action-junit-report@v6
        if: success() || failure()
        with:
          report_paths: '**/build/test-results/**/TEST-*.xml'
          comment: 'true'
          include_passed: 'true'
